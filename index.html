<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>User Feedback Form</h1>

        <form id="feedback-form">

            <div class="form-group">
                <label for="name">Name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Enter your name"
                    data-tooltip="Please enter your full name."
                >
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    data-tooltip="Enter a valid email address."
                >
            </div>

            <div class="form-group">
                <label for="comments">Comments</label>

                <textarea
                    id="comments"
                    rows="5"
                    placeholder="Write your feedback..."
                    data-tooltip="Tell us what you think!"
                ></textarea>

                <p id="char-count">Characters: 0</p>
            </div>

            <p id="message"></p>

            <button type="submit">
                Submit Feedback
            </button>

        </form>

        <hr>

        <h2>Submitted Feedback</h2>

        <div id="feedback-display"></div>

    </div>

    <script src="cp_1.js"></script>

</body>
</html>
